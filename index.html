<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEFAI - Verificación Arancelaria</title>
    <style>
        /* Definición de colores corporativos */
        :root {
            --go-blue: #004EA8;
            --go-yellow: #FEDB00;
            --white: #FFFFFF;
            --light-gray: #F3F4F6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--light-gray);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background-color: var(--white);
            width: 100%;
            max-width: 550px;
            padding: 45px 35px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            text-align: center;
            border-top: 12px solid var(--go-yellow);
            position: relative;
        }

        /* Logo del zapato superior - Tamaño Grande y Optimizado */
        .logo-top {
            width: 200px;
            height: auto;
            margin-bottom: 15px;
            display: inline-block;
            transition: transform 0.3s ease;
        }

        /* Ocultar el icono de imagen rota si la imagen falla */
        img:not([src]) {
            visibility: hidden;
        }

        .logo-top:hover {
            transform: scale(1.05);
        }

        h1 {
            color: var(--go-blue);
            font-size: 1.4rem;
            line-height: 1.3;
            margin-bottom: 8px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .siglas {
            display: block;
            font-size: 3rem;
            color: var(--go-blue);
            letter-spacing: 6px;
            margin-bottom: 40px;
            font-weight: 900;
        }

        .instruccion {
            font-size: 1.1rem;
            color: #222;
            margin-bottom: 25px;
            font-weight: 600;
        }

        /* Contenedores de opciones */
        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .option-label {
            position: relative;
            cursor: pointer;
        }

        .option-label input {
            position: absolute;
            opacity: 0;
        }

        .option-design {
            padding: 20px 12px;
            background-color: #fdfdfd;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            font-weight: bold;
            color: var(--go-blue);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: block;
            font-size: 1rem;
        }

        .option-label input:checked + .option-design {
            border-color: var(--go-blue);
            background-color: var(--go-yellow);
            transform: translateY(-4px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.12);
        }

        /* Menú secundario para Pulgadas */
        #menu-secundario {
            display: none;
            margin-top: 25px;
            padding-top: 30px;
            border-top: 2px dashed #eee;
            animation: slideUp 0.4s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Botón de acción final */
        #btn-iniciar-container {
            display: none;
            margin-top: 45px;
            animation: fadeIn 0.6s ease forwards;
        }

        .btn-iniciar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--go-blue);
            color: white;
            padding: 16px 35px; /* Relleno ajustado */
            border: none;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            box-shadow: 0 8px 20px rgba(0, 78, 168, 0.35);
            width: auto; /* Ancho reducido (automático al contenido) */
            min-width: 200px;
        }

        .btn-iniciar:hover {
            background-color: #003a7d;
            transform: scale(1.02);
            box-shadow: 0 10px 28px rgba(0, 78, 168, 0.45);
        }

        .btn-iniciar img {
            height: 28px;
            margin-left: 10px; /* Un solo espacio visual de distancia */
            filter: brightness(0) invert(1);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Diseño responsivo */
        @media (max-width: 480px) {
            .options-container {
                grid-template-columns: 1fr;
            }
            .card {
                padding: 40px 20px;
            }
            h1 {
                font-size: 1.2rem;
            }
            .siglas {
                font-size: 2.2rem;
            }
            .logo-top {
                width: 160px;
            }
            .btn-iniciar {
                width: 100%; /* En móviles muy pequeños sí puede ser útil el ancho completo */
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Logo Principal con redundancia de carga -->
        <img src="pictures/logo_limpio.png" alt="Logo Goodyear" class="logo-top" id="mainLogo" onerror="this.onerror=null; this.src='logo.png';">
        
        <h1>Verificación de Fracción Arancelaria e Impuestos</h1>
        <span class="siglas">VEFAI</span>

        <!-- Selección de Nomenclatura -->
        <div class="instruccion">Seleccione la nomenclatura principal de la llanta:</div>
        <div class="options-container">
            <label class="option-label">
                <input type="radio" name="nomenclatura" value="milimetros" onchange="checkLogic()">
                <span class="option-design">Milímetros</span>
            </label>
            <label class="option-label">
                <input type="radio" name="nomenclatura" value="pulgadas" onchange="checkLogic()">
                <span class="option-design">Pulgadas</span>
            </label>
        </div>

        <!-- Menú Condicional para Pulgadas -->
        <div id="menu-secundario">
            <div class="instruccion">Seleccione el tipo de llanta:</div>
            <div class="options-container">
                <label class="option-label">
                    <input type="radio" name="tipo_llanta" value="lt" onchange="checkLogic()">
                    <span class="option-design">LT (Light Truck)</span>
                </label>
                <label class="option-label">
                    <input type="radio" name="tipo_llanta" value="camion" onchange="checkLogic()">
                    <span class="option-design">Camión</span>
                </label>
            </div>
        </div>

        <!-- Botón de Inicio dinámico -->
        <div id="btn-iniciar-container">
            <button class="btn-iniciar" onclick="alert('Iniciando proceso...')">
                INICIAR <img src="pictures/logo_limpio.png" alt="Logo Botón" onerror="this.onerror=null; this.src='logo.png';">
            </button>
        </div>
    </div>

    <script>
        function checkLogic() {
            const nomSelected = document.querySelector('input[name="nomenclatura"]:checked');
            const tipoSelected = document.querySelector('input[name="tipo_llanta"]:checked');
            
            const menuSecundario = document.getElementById('menu-secundario');
            const btnContainer = document.getElementById('btn-iniciar-container');

            if (!nomSelected) return;

            if (nomSelected.value === 'milimetros') {
                menuSecundario.style.display = 'none';
                btnContainer.style.display = 'block';
                const radiosTipo = document.getElementsByName('tipo_llanta');
                radiosTipo.forEach(r => r.checked = false);
            } 
            else if (nomSelected.value === 'pulgadas') {
                menuSecundario.style.display = 'block';
                if (tipoSelected) {
                    btnContainer.style.display = 'block';
                } else {
                    btnContainer.style.display = 'none';
                }
            }
        }
    </script>
</body>
</html>
